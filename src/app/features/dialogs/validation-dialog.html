<dialog #dlg id="validDlg" (close)="report.schliesse()">
  <h3 style="margin-top: 0">{{ report.titel() }}</h3>
  <p style="font-size: 12.5px; color: var(--muted); margin-top: 0">
    Die Nachricht wurde gegen das XJustiz-Schema geprüft ({{ report.fehler().length }} Fehler):
  </p>
  <div class="validFehler">
    @for (f of report.fehler(); track $index) {
      <div class="vfItem">{{ f }}</div>
    }
  </div>
  <div style="text-align: right; margin-top: 12px">
    <button class="primary" (click)="report.schliesse()">Schließen</button>
  </div>
</dialog>
