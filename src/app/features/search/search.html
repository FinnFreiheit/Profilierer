<div class="toolgroup" style="position: relative">
  <input
    type="text"
    placeholder="Im Baum suchen…"
    style="width: 160px"
    [disabled]="!hasRoot()"
    [value]="query()"
    (input)="onInput($event)"
    (focus)="onFocus($event)"
    (blur)="focused.set(false)"
    (keydown)="onKeydown($event)"
  />
  @if (open()) {
    <div id="searchPanel" class="open" style="position: absolute; top: calc(100% + 4px)" [style.left.px]="panelLeft()">
      @for (h of hits(); track h.path; let i = $index) {
        <div class="srItem" [class.hot]="i === 0" (mousedown)="pick(h.path)">
          <div class="sl">
            {{ h.label }}
            @if (h.tech && h.tech !== h.label) {
              <span style="font-weight: 400; color: var(--muted); font-family: var(--mono); font-size: 11px">{{ h.tech }}</span>
            }
          </div>
          @if (h.crumb) {
            <div class="sc">{{ h.crumb }}</div>
          }
          @if (h.value) {
            <div class="sd" style="color: var(--accent)">Wert: {{ h.value }}</div>
          }
          @if (h.doc) {
            <div class="sd">{{ h.doc }}</div>
          }
        </div>
      }
      @if (!hits().length) {
        <div style="padding: 12px 14px; color: var(--muted); font-size: 12.5px">keine Treffer</div>
      }
    </div>
  }
</div>
