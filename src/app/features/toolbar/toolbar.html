<div id="toolbar">
  <app-message-picker></app-message-picker>

  <div class="toolgroup">
    <label for="profilName">Szenario:</label>
    <input
      type="text"
      id="profilName"
      placeholder="Name des Kommunikationsszenarios"
      [value]="state.meta().name || ''"
      (change)="onName($event)"
    />
    <button title="Autor, Beschreibung, Datum" (click)="metaClick.emit()">Details…</button>
    <button title="Statusstufen konfigurieren" (click)="statusClick.emit()">Status…</button>
  </div>

  <span id="fortschritt">{{ fortschrittText() }}</span>
  <span id="autosaveInfo">{{ state.autosaveInfo() }}</span>
  <span class="spacer"></span>

  <app-search></app-search>

  <div class="toolgroup">
    <label title="Versionsunterschiede im Baum markieren">
      <input type="checkbox" [disabled]="!hasIdxB()" [checked]="state.showDiff()"
        (change)="state.showDiff.set(checked($event))" /> Diff
    </label>
    <label title="Aktiver Pfad und seine Kinder in voller Größe, alles andere als Kompakt-Chips">
      <input type="checkbox" [checked]="state.focusMode()"
        (change)="state.focusMode.set(checked($event))" /> Fokus
    </label>
    <label>
      <input type="checkbox" [checked]="state.showTech()"
        (change)="state.showTech.set(checked($event))" /> Technik
    </label>
    <label>
      <input type="checkbox" [checked]="state.showRefs()"
        (change)="state.showRefs.set(checked($event))" /> Verweise
    </label>
    <label>
      <input type="checkbox" [checked]="state.onlyProfile()"
        (change)="state.onlyProfile.set(checked($event))" /> nur Profil
    </label>
    <button [disabled]="!hasRoot()" (click)="expand()">Alles ausklappen</button>
    <button [disabled]="!hasRoot()" (click)="collapse()">Zuklappen</button>
  </div>

  <div class="toolgroup">
    <button [disabled]="!hasRoot()" (click)="saveClick.emit()">Speichern</button>
    <button [disabled]="!hasRoot()" (click)="excelClick.emit()">Excel</button>
    <button [disabled]="!hasRoot()" (click)="schClick.emit()">Schematron</button>
    <button [disabled]="!hasRoot()" (click)="xmlClick.emit()">Beispiel-XML</button>
    <button [disabled]="!hasRoot()" (click)="printClick.emit()">Drucken</button>
  </div>
</div>
