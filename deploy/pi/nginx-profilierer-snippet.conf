# XJustiz Profilierer unter /profilierer auf dem xjw.freiheits.de-vhost.
#
# Wird als Snippet in den 443-Server-Block der XJW-Site eingebunden
# (Include-Glob in XJW/deploy/pi/nginx-xjustiz.conf):
#   include /etc/nginx/snippets/xjp-profilierer*.conf;
#
# Kein Cookie-Check hier: nginx waehlt den laengsten Prefix-Match, d. h.
# /profilierer/* laeuft an XJWs "location /"-Login vorbei (bewusst offen).
# Der Node-Prozess lauscht nur auf 127.0.0.1:3001 (systemd: XJP_HOST).

location = /profilierer { return 301 /profilierer/; }

location /profilierer/ {
    # Trailing Slash am proxy_pass: nginx ersetzt den Location-Praefix,
    # /profilierer/api/... kommt beim Node-Server als /api/... an.
    proxy_pass http://127.0.0.1:3001/;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Die Profil-API nimmt JSON bis 25 MB an (express.json-Limit).
    client_max_body_size 30m;

    # XRepository-Durchreiche (/profilierer/xrep-api/...) kann dauern.
    proxy_connect_timeout 30s;
    proxy_read_timeout    120s;
}
