name: CI

on:
  # Jeder Branch, nicht nur main — sonst bekommt ein Feature-Branch ohne
  # offenen Pull Request gar keine Rueckmeldung. Kein pull_request-Trigger,
  # weil das im Ein-Personen-Repo jeden PR-Lauf verdoppeln wuerde; bei
  # Beitraegen aus Forks waere er nachzuruesten.
  push:
  workflow_dispatch:

concurrency:
  # Bei schneller Folge von Pushes nur den letzten Lauf behalten.
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Einzige Quelle fuer die Node-Version ist .nvmrc.
          node-version-file: .nvmrc
          cache: npm

      - name: Abhaengigkeiten (Frontend)
        run: npm ci

      - name: Abhaengigkeiten (Backend)
        run: npm ci --prefix server

      - name: Lint
        run: npm run lint

      - name: Formatierung
        run: npm run format:check

      - name: Chrome for Testing
        # Explizit, weil npm 11 Install-Skripte (und damit puppeteers
        # Postinstall-Download) standardmaessig nicht mehr ausfuehrt.
        run: npx puppeteer browsers install chrome

      - name: Unit-Tests (headless)
        # test-headless.mjs nimmt den puppeteer-Pfad als CHROME_BIN.
        run: npm run test:ci

      - name: Backend-Tests
        run: npm run test:server

      - name: Build
        run: npm run build
